# ============================================================
# Nginx Reverse Proxy — AI Tutoring System
# ============================================================
# Routes:
#   /              → frontend  (Streamlit :8501)
#   /api/          → backend   (FastAPI   :8000)  — strips /api prefix
#   /_stcore/      → frontend  (Streamlit WebSocket)
# ============================================================

# ---------- Upstreams ----------
upstream frontend {
    server frontend:8501;
}

upstream backend {
    server backend:8000;
}

# ---------- Rate limiting ----------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    server_name _;

    # Allow health checks over HTTP
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS server ----------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # --- TLS Configuration ---
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security Headers ---
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Body size limit ---
    client_max_body_size 10m;

    # --- Timeouts ---
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # --- Common proxy headers ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Backend API (strip /api prefix) ---
    # /api/health  →  backend:8000/health
    # /api/chat    →  backend:8000/chat
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://backend/;
    }

    # --- Auth endpoints — stricter rate limit ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://backend/auth/;
    }

    # --- Streamlit WebSocket / internal routes ---
    location /_stcore/ {
        proxy_pass http://frontend/_stcore/;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # --- Streamlit static assets ---
    location /static/ {
        proxy_pass http://frontend/static/;
    }

    location /component/ {
        proxy_pass http://frontend/component/;
    }

    location /vendor/ {
        proxy_pass http://frontend/vendor/;
    }

    # --- Frontend (Streamlit) — default route ---
    location / {
        proxy_pass http://frontend;

        # WebSocket support for Streamlit
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # --- Nginx health ---
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
